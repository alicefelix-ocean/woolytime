<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#7bc4dc"><link rel="manifest" href="/manifest.json">
  <title>Woolytime 🐑</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow-x: hidden; background: #f0f7e6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #app { max-width: 640px; margin: 0 auto; padding: 12px 12px 0; min-height: 100vh; display: flex; flex-direction: column; }
    #pasture { width: 100%; height: 220px; position: relative; overflow: hidden; border-radius: 20px; margin-bottom: 14px; }
    @media (max-width: 400px) { #pasture { height: 200px; } }
    #sky { position: absolute; inset: 0; background: linear-gradient(180deg, #7bc4dc 0%, #a8d8ec 55%, #c8eaf6 100%); }
    #hill-back  { position:absolute; bottom:0; left:-5%; right:-5%; height:105px; background:#c8e88a; border-radius:55% 55% 0 0/55px; z-index:3; }
    #hill-mid   { position:absolute; bottom:0; left:-8%; right:-8%; height:80px;  background:#a0d960; border-radius:52% 52% 0 0/45px; z-index:4; }
    #hill-front { position:absolute; bottom:0; left:-3%; right:-3%; height:58px;  background:#88cc44; border-radius:48% 48% 0 0/35px; z-index:5; }
    #trees { position:absolute; bottom:90px; left:0; right:0; height:60px; z-index:3; }
    #flower-strip { position:absolute; bottom:0; left:0; right:0; height:68px; z-index:7; pointer-events:none; }
    @keyframes gentleSway { 0%,100% { transform-origin:50% 100%; transform:rotate(-2deg); } 50% { transform-origin:50% 100%; transform:rotate(2deg); } }
    .fl { animation:gentleSway ease-in-out infinite; }
    @keyframes cloudDrift { from{transform:translateX(-240px)} to{transform:translateX(110%)} }
    .cloud { position:absolute; z-index:2; animation:cloudDrift linear infinite; }
    @keyframes bGraze { 0%,100%{transform:translateY(0)} 50%{transform:translateY(2.5px)} }
    .bsheep { position:absolute; z-index:6; animation:bGraze ease-in-out infinite; }
    @keyframes sheepWalk  { 0%{left:-110px} 100%{left:110%} }
    @keyframes sheepGraze { 0%,100%{bottom:12px} 50%{bottom:7px} }
    @keyframes sheepSleep { 0%,100%{bottom:12px;transform:translateX(-50%) rotate(-4deg)} 50%{bottom:17px;transform:translateX(-50%) rotate(-4deg)} }
    @keyframes legF { 0%,100%{transform:rotate(16deg)} 50%{transform:rotate(-16deg)} }
    @keyframes legB { 0%,100%{transform:rotate(-16deg)} 50%{transform:rotate(16deg)} }
    .lf { animation:legF 0.7s ease-in-out infinite; animation-play-state:paused; }
    .lb { animation:legB 0.7s ease-in-out infinite; animation-play-state:paused; }
    @keyframes zFloat { 0%{opacity:1;transform:translateY(0) scale(0.9)} 100%{opacity:0;transform:translateY(-22px) scale(1.3)} }
    #sheep-wrap { position:absolute; bottom:12px; left:44%; transform:translateX(-50%); width:96px; height:108px; z-index:8; }
    #timer-card { background:#ffffff; border:0.5px solid rgba(0,0,0,0.08); border-radius:20px 20px 0 0; padding:18px 16px 32px; flex:1; }
    .tab { font-size:12px; padding:6px 16px; border-radius:20px; border:0.5px solid #d0d0d0; background:transparent; color:#666; cursor:pointer; -webkit-tap-highlight-color:transparent; }
    .tab.on { background:#88cc44; border-color:#70aa30; color:#1e3a08; }
    .timed { text-align:center; margin-bottom:16px; }
    #td { font-size:58px; font-weight:500; letter-spacing:-3px; line-height:1; color:#1a1a1a; margin-bottom:4px; }
    #ml { font-size:11px; color:#888; text-transform:uppercase; letter-spacing:2px; }
    #msg { font-size:13px; color:#888; margin-top:6px; min-height:18px; }
    .btns { display:flex; justify-content:center; gap:10px; margin-bottom:16px; }
    .btn { border:0.5px solid #d0d0d0; background:#fff; color:#333; border-radius:10px; padding:11px 24px; font-size:14px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
    .btn.p { background:#88cc44; border-color:#70aa30; color:#1e3a08; min-width:100px; font-weight:500; }
    .dots { display:flex; justify-content:center; gap:10px; }
    .dot { width:8px; height:8px; border-radius:50%; background:#e0e0e0; transition:background 0.4s; }
    .dot.done { background:#88cc44; }
    #logo { position:absolute; top:12px; left:14px; z-index:10; font-size:13px; font-weight:600; color:#1e4a14; background:rgba(255,255,255,0.75); padding:3px 10px; border-radius:12px; }
    #mbtn { position:absolute; top:12px; right:12px; z-index:10; background:rgba(255,255,255,0.75); border:none; border-radius:12px; padding:4px 12px; font-size:12px; cursor:pointer; color:#1e4a14; }
  </style>
</head>

    <div id="logo">🐑 woolytime</div>
    <button id="mbtn" onclick="toggleMusic()">♪ off</button>
  </div>
  <div id="timer-card">
    <div class="tabs">
      <button class="tab on" id="t-focus" onclick="setMode('focus')">Focus</button>
      <button class="tab" id="t-short" onclick="setMode('short')">Short break</button>
      <button class="tab" id="t-long" onclick="setMode('long')">Long break</button>
    </div>
    <div class="timed">
      <div id="td">25:00</div>
      <div id="ml">Focus time</div>
      <div id="msg">Ready when you are 🐑</div>
    </div>
    <div class="btns">
      <button class="btn" onclick="doReset()">Reset</button>
      <button class="btn p" id="sb" onclick="doToggle()">Start</button>
    </div>
    <div class="dots">
      <div class="dot" id="d1"></div><div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div><div class="dot" id="d4"></div>
    </div>
  </div>
</div>
<script>
const MODES={focus:{l:'Focus time',d:25*60},short:{l:'Short break',d:5*60},long:{l:'Long break',d:15*60}};
const MSGS={focus:['Deep work mode on 🌿','Stay in the zone!','Baa-lliant focus!','You got this!'],short:['Munch some flowers 🌸','Woolly break time!','Stretch those hooves!','Baaa. Breathe.'],long:['Long rest 💤','Sheep nap incoming!','Recharge fully 🌙','Sweet woolly dreams!'],done:['Baaaa! You did it! 🎉','Session complete! 🌟','Wool done! 🐑','Excellent work!']};
let mode='focus',rem=25*60,running=false,iv=null,sess=0,musicOn=false,audioCtx=null,mTimer=null;
const wrap=document.getElementById('sheep-wrap'),zzz=document.getElementById('zzz'),legs=document.querySelectorAll('.lf,.lb');
function rand(a){return a[Math.floor(Math.random()*a.length)];}
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function sheepState(st){wrap.style.animation='';wrap.style.left='44%';wrap.style.bottom='12px';wrap.style.transform='translateX(-50%)';zzz.style.display='none';legs.forEach(l=>l.style.animationPlayState='paused');if(st==='walk'){wrap.style.transform='none';wrap.style.left='-110px';wrap.style.animation='sheepWalk '+(mode==='focus'?'16s':'28s')+' linear infinite';legs.forEach(l=>l.style.animationPlayState='running');}else if(st==='graze'){wrap.style.animation='sheepGraze 2s ease-in-out infinite';}else if(st==='sleep'){wrap.style.animation='sheepSleep 2.5s ease-in-out infinite';zzz.style.display='block';}}
function setMode(m){mode=m;running=false;clearInterval(iv);rem=MODES[m].d;document.getElementById('td').textContent=fmt(rem);document.getElementById('ml').textContent=MODES[m].l;document.getElementById('msg').textContent=rand(MSGS[m]);document.getElementById('sb').textContent='Start';document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));document.getElementById('t-'+m).classList.add('on');sheepState('idle');}
function doToggle(){if(running){running=false;clearInterval(iv);document.getElementById('sb').textContent='Resume';sheepState('graze');document.getElementById('msg').textContent='Paused. Sheep is snacking 🌸';}else{running=true;document.getElementById('sb').textContent='Pause';sheepState('walk');document.getElementById('msg').textContent=rand(MSGS[mode]);iv=setInterval(tick,1000);}}
function tick(){rem--;document.getElementById('td').textContent=fmt(rem);if(rem<=0){clearInterval(iv);running=false;document.getElementById('sb').textContent='Start';document.getElementById('msg').textContent=rand(MSGS.done);if(mode==='focus'){sess=Math.min(sess+1,4);updateDots();}sheepState('sleep');ding();}}
function doReset(){running=false;clearInterval(iv);rem=MODES[mode].d;document.getElementById('td').textContent=fmt(rem);document.getElementById('sb').textContent='Start';document.getElementById('msg').textContent=rand(MSGS[mode]);sheepState('idle');}
function updateDots(){for(let i=1;i<=4;i++)document.getElementById('d'+i).className='dot'+(i<=sess?' done':'');if(sess>=4)sess=0;}
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function ding(){try{const c=getAC(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(660,c.currentTime);o.frequency.exponentialRampToValueAtTime(440,c.currentTime+0.7);g.gain.setValueAtTime(0.25,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+1.5);o.start();o.stop(c.currentTime+1.5);}catch(e){}}
function note(){if(!musicOn)return;try{const c=getAC(),s=[261.6,293.7,329.6,349.2,392,440,493.9],o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=s[Math.floor(Math.random()*s.length)];const n=c.currentTime;g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(0.05,n+0.2);g.gain.exponentialRampToValueAtTime(0.001,n+2);o.start(n);o.stop(n+2.2);mTimer=setTimeout(note,1000+Math.random()*2000);}catch(e){}}
function toggleMusic(){musicOn=!musicOn;document.getElementById('mbtn').textContent=musicOn?'♪ on':'♪ off';if(musicOn){note();setTimeout(note,700);}else clearTimeout(mTimer);}
sheepState('idle');updateDots();
</script>
</body>
</html>
